apiVersion: batch/v1
kind: CronJob
metadata:
  name: jenkins-volume-editor
spec:
  schedule: "* * 31 2 *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: volume-editor
              image: busybox:1.28
              imagePullPolicy: IfNotPresent
              volumeMounts:
                - mountPath: "/filehoster"
                  name: filehoster-volume
                - mountPath: "/dogu"
                  name: dogu-volume
              command:
                - /bin/sh
                - -c
                - |
                  rmList="/filehoster/jenkins/rmList"
                  mvList="/filehoster/jenkins/mvList"
                  if [[ -e "${rmList}" ]]; then
                    while read -r line
                    do
                      rm -rf /dogu/"${line}" || true
                    done < "${rmList}"
                  fi
                  
                  if [[ -e "${mvList}" ]]; then
                    while read -r line
                    do
                      src=$(echo ${line} | cut -d' ' -f1)
                      dest=$(echo ${line} | cut -d' ' -f2)
                      echo "${src}"
                      echo "${dest}"
                      mv -f /dogu/"${src}" /dogu/"${dest}" || true
                    done < "${mvList}"
                  fi
                  
                  cp -rf /filehoster/jenkins/* /dogu
          volumes:
            - name: filehoster-volume
              persistentVolumeClaim:
                claimName: filehoster-pvc
            - name: dogu-volume
              persistentVolumeClaim:
                claimName: jenkins