apiVersion: v1
kind: ConfigMap
metadata:
  name: k8s-ces-gateway-config
  labels:
    k8s.cloudogu.com/component.config: "k8s-ces-gateway"
data:
  values: |-
    traefik:
      ports:
        tcp-2222:
          port: 2222
          protocol: TCP
        tcp-50000:
          port: 50000
          protocol: TCP
        tcp-50001:
          port: 50001
          protocol: TCP